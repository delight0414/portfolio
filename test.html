<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Animation</title>
<style>
body {
    background-color: #000;
}
a.button {
    display: inline-block;
    padding: 5px 15px;
    border: 1px solid #E8E5E3;
    color: #E8E5E3;
    border-radius: 30px;
    transition: 0.3s;
}
a.button span {
    font-size: 1.125em;
}
a.button:hover {
    background-color: #cb450c;
    border: transparent;
    color: #000;
}
a.button .link {
    position: relative;
    z-index: 1;
    display: inline-flex;
    align-items: center;
    overflow: hidden;
}
a.button .link_inner {
    display: flex;
    transform: translateY(0);
    transition: transform 0.3s cubic-bezier(.175,.885,.32,1.275) ;
}
a.button:hover .link_inner {
    transform: translateY(-100%);
}
a.button .link_animated {
    position: absolute;
    top: 100%;
    display: none;
}
a.button:hover .link_animated {
    display: inline-block;
}
</style>
</head>
<body>
<a href="" class="button">
    <span class="link">
        <span class="link_inner">
            <span>CODEPEN</span>
            <span class="link_animated">CODEPEN</span>
        </span>
    </span>
</a>
</body>
</html>
