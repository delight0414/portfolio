<!DOCTYPE html>
<html lang="ko">
<head>
<title>basic :: JavaScript Example</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@100..900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
body {
	font-family: "Bebas Neue", "Noto Sans KR", sans-serif;
	font-size: 1em;
	overflow-x: hidden;
}
body, h1, h2, h3, h4, h5, h6, p, ul, ol, table, dl, dd {
	margin: 0;
	padding: 0;
}
h1 {
	font-size: 16px;
}
a {
	text-decoration: none;
	color: #000;
}
ul, ol {
	list-style: none;
}
img {
	max-width: 100%;
	vertical-align: top;
	border: none;
}
.marquee-snap {
    height: 10vw;
    width: fit-content;
    overflow: hidden;
}
.marquee-snap .marquee_track-snap {
    width: 100%;
    height: 100%;
}
.marquee-snap .marquee_track-snap .marquee_item-snap {
    width: fit-content;
    height: 100%;
    text-align: left;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding-top: 0;
    display: flex
}
.marquee-snap .marquee_track-snap .marquee_item-snap .marquee_text {
    font-family: "Bebas Neue";
    font-size: 10vw;
    text-rendering: optimizeLegibility;
    position: relative;
    color: #000;
    line-height: 0.9;
}
@media only screen and (max-width:1280px) {
    body {
        font-size: 0.975em;
    }
    .marquee-snap {
        height: 12vw;
    }
    #main .text_wrap .inline .text_title,
    h2 {
        font-size: 12vw;
    }
}
@media only screen and (max-width:940px){
    body {
        font-size: 0.875em;
    }
    .marquee-snap {
        height: 16vw;
    }
    #main .text_wrap .inline .text_title,
    h2 {
        font-size: 16vw;
    } 
}
@media only screen and (max-width:720px){
    body {
        font-size: 0.8125em;
    }
    #main .top {
        padding: 0 30px;
    }
    #main .keytext_top {
        left: 30px;
    }
    #main .text_wrap .inline .text_title,
    h2 {
        font-size: 18vw;
    } 
    .marquee-snap {
        height: 18vw;
    }
    #main .keytext_bottom {
        right: 30px;
    }
    nav#gnb { 
        display: none;
    }
    header.top a.tab,
    #main a.tab {
        display: block;
    }
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.6.1/gsap.min.js"></script>
<script src="http://code.jquery.com/jquery-1.10.1.min.js"></script>
<script>
window.addEventListener("load", function(){
    document.querySelectorAll(".marquee-snap").forEach(function(element) {
    let track = element.querySelector(".marquee_track-snap");
    let items = element.querySelectorAll(".marquee_item-snap");
    let tl = gsap.timeline({ repeat: -1, defaults: { ease: "expo.inOut", duration: 1, delay: 1 } });

    items.forEach(function(item, index) {
      let distance = (index + 1) * -100;
        tl.to(track, { yPercent: distance });
    });

    let clonedItem = items[0].cloneNode(true);
    track.appendChild(clonedItem);
    });
});

</script>
</head>

<body>
<div class="wrapper">
    <div class="marquee-snap">
        <div class="marquee_track-snap">
            <div class="marquee_item-snap">
                <h2 class="marquee_text">HTML</h2>
            </div>
            <div class="marquee_item-snap">
                <h2 class="marquee_text">CSS</h2>
            </div>
            <div class="marquee_item-snap">
                <h2 class="marquee_text">jQuery</h2>
            </div>
            <div class="marquee_item-snap">
                <h2 class="marquee_text">Javascript</h2>
            </div>
            <div class="marquee_item-snap">
                <h2 class="marquee_text">React</h2>
            </div>
            <div class="marquee_item-snap">
                <h2 class="marquee_text">Node.js</h2>
            </div>
        </div>
    </div>
</div>
</body>
</html>
