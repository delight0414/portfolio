<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scroll Background Change</title>
<style>
  body {
    transition: background-color 0.5s ease;
    margin: 0;
    padding: 0;
    height: 2000px; /* 스크롤 가능한 페이지 길이 설정 */
  }
  
  section {
    height: 500px; /* 각 섹션의 높이 설정 */
    border: 1px solid black;
  }

  .section1 { background-color: #ffcccc; }
  .section2 { background-color: #ccffcc; }
  .section3 { background-color: #ccccff; }
  .section4 { background-color: #ffffcc; }
</style>
</head>
<body>
<section class="section1">Section 1</section>
<section class="section2">Section 2</section>
<section class="section3">Section 3</section>
<section class="section4">Section 4</section>

<script>
  window.addEventListener('scroll', function() {
    var sections = document.querySelectorAll('section');
    var body = document.querySelector('body');
    
    sections.forEach(function(section, index) {
      var sectionTop = section.offsetTop;
      var sectionHeight = section.clientHeight;
      var scrollPosition = window.pageYOffset;

      if (scrollPosition >= sectionTop && scrollPosition < sectionTop + sectionHeight) {
        body.style.backgroundColor = section.style.backgroundColor;
      }
    });
  });
</script>
</body>
</html>
